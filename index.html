<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Suite landing page | VIMP</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
  <link rel="stylesheet" href="./styles/main.css">
</head>

<body>

  <header class="header">
    <div class="header__inner container cluster">
      <a href="https://www.google.com" class="logo">
        <img src="./assets/images/logos/logo.svg" alt="Suite">
      </a>
      <button type="button" class="button button--secondary">
        Request Beta Access
      </button>
    </div>
  </header>

  <main>
    <section class="intro">
      <div class="intro__inner container">

        <div class="intro__content stack">
          <div class="intro__text stack">
            <h1 class="intro__title">
              A <span class="intro__highlight">super solution</span> for your <span
                class="intro__highlight">business.</span>
            </h1>
            <p class="intro__description">
              Our marketing and sales automations help you scale your outreach to get more leads for your company.
            </p>
          </div>
          <button type="button" class="button button--primary">
            Request Beta Access
          </button>
        </div>

        <div class="intro__media">
          <picture>
            <source media="(min-width: 48rem)"
              srcset="./assets/images/illustrations/hero-portrait.webp 1x, ./assets/images/illustrations/hero-portrait@2x.webp 2x"
              type="image/webp">
            <source media="(min-width: 48rem)"
              srcset="./assets/images/illustrations/hero-portrait.png 1x, ./assets/images/illustrations/hero-portrait@2x.png 2x"
              type="image/png">
            <source
              srcset="./assets/images/illustrations/hero-landscape.webp 1x, ./assets/images/illustrations/hero-landscape@2x.webp 2x"
              type="image/webp">
            <img src="./assets/images/illustrations/hero-landscape.png"
              srcset="./assets/images/illustrations/hero-landscape.png 1x, ./assets/images/illustrations/hero-landscape@2x.png 2x"
              alt="Illustration of analytics dashboard with growth chart">
          </picture>
        </div>

        <dl class="stats">
          <div class="stats__item">
            <dt class="stats__value">2K+</dt>
            <dd class="stats__label">Companies</dd>
          </div>
          <div class="stats__item">
            <dt class="stats__value">8</dt>
            <dd class="stats__label">Languages</dd>
          </div>
          <div class="stats__item">
            <dt class="stats__value">1.2M</dt>
            <dd class="stats__label">Leads</dd>
          </div>
        </dl>

      </div>
    </section>
  </main>

  <!-- 
  It just works.

  “I really like how it is an all-in-one solution that handle many of 
  the tasks that you would normally need separate tools to do the same 
  job. This thing is a miracle worker.”

  Jeremy Robinson
  CMO, Fylo

  Copyright - Suite -->

</body>

</html>
